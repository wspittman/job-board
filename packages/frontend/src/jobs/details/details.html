<section class="container card" aria-labelledby="heading">
  <div class="header">
    <div>
      <h3 id="title" class="title"></h3>
      <a
        id="companyLink"
        class="company"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span id="company"></span>
        <span id="companyExternalIcon">
          <svg data-icon="external-link" aria-hidden="true"></svg>
        </span>
      </a>
    </div>
    <div class="actions">
      <button
        id="copy"
        class="copy"
        type="button"
        aria-label="Copy job link to clipboard"
        data-status="idle"
      >
        <svg data-icon="clipboard" aria-hidden="true"></svg>
        <svg data-icon="clipboard-check" aria-hidden="true"></svg>
        <svg data-icon="clipboard-x" aria-hidden="true"></svg>
      </button>
      <a id="apply" class="abtn" target="_blank" rel="noopener noreferrer"
        >Apply</a
      >
    </div>
  </div>
  <div id="chips"></div>
  <jobs-detail-embed id="description"></jobs-detail-embed>
</section>
